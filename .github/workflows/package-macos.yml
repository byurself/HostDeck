name: Package macOS App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Build and package HostDeck
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          swift --version
          xcodebuild -version
          brew --version

      - name: Install system dependencies
        run: |
          brew install libssh2

      - name: Build and package app
        run: |
          ./script/package_app.sh

      - name: Verify packaged app
        run: |
          test -d dist/HostDeck.app
          test -f dist/HostDeck-macOS.zip
          /usr/bin/codesign --verify --deep --strict --verbose=2 dist/HostDeck.app
          /usr/bin/plutil -p dist/HostDeck.app/Contents/Info.plist

      - name: Upload packaged app
        uses: actions/upload-artifact@v4
        with:
          name: HostDeck-macOS
          path: dist/HostDeck-macOS.zip
          if-no-files-found: error
          retention-days: 30
