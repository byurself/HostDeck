<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="xterm.css">
  <style>
    html, body, #terminal {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }
    html, body, #terminal {
      background: #1e1e1e;
    }
    .xterm {
      padding: 12px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <script src="xterm.js"></script>
  <script src="addon-fit.js"></script>
  <script>
    const themes = {
      dark: {
        background: '#1e1e1e',
        foreground: '#d7d7d7',
        cursor: '#ffffff',
        selectionBackground: '#3a5f8f'
      },
      light: {
        background: '#fbfbfb',
        foreground: '#202124',
        cursor: '#1f1f1f',
        selectionBackground: '#9fc5f8'
      }
    };

    const term = new Terminal({
      cursorBlink: true,
      convertEol: true,
      fontFamily: 'SFMono-Regular, Menlo, Monaco, Consolas, monospace',
      fontSize: 14,
      scrollback: 2000,
      theme: themes.dark
    });

    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));
    fitAddon.fit();
    term.focus();

    term.onData(data => {
      window.webkit.messageHandlers.terminalInput.postMessage(data);
    });

    function notifyResize() {
      fitAddon.fit();
      window.webkit.messageHandlers.terminalResize.postMessage({
        cols: term.cols,
        rows: term.rows
      });
    }

    window.addEventListener('resize', notifyResize);
    setTimeout(notifyResize, 0);

    window.hostDeckConfigure = function(config) {
      const theme = themes[config.theme] || themes.dark;
      term.options = {
        cursorBlink: config.cursorBlink !== false,
        fontFamily: config.fontFamily || 'SFMono-Regular, Menlo, Monaco, Consolas, monospace',
        fontSize: Number(config.fontSize) || 14,
        scrollback: Number(config.scrollback) || 2000,
        theme: theme
      };
      document.documentElement.style.background = theme.background;
      document.body.style.background = theme.background;
      document.getElementById('terminal').style.background = theme.background;
      notifyResize();
    };

    window.hostDeckWrite = function(data) {
      term.write(data);
    };

    window.hostDeckReset = function() {
      term.reset();
    };

    window.hostDeckFocus = function() {
      term.focus();
    };
  </script>
</body>
</html>
